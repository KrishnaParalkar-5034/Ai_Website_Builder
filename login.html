<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteBuilder – Login</title>
  <meta name="description" content="Sign in to your SiteBuilder account to create AI-powered websites." />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at center, #5b2cff, #000);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -50%;
      background: radial-gradient(circle, rgba(168,85,247,0.35), transparent 60%);
      animation: glowMove 12s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes glowMove {
      0% { transform: translate(-10%, -10%); }
      50% { transform: translate(10%, 10%); }
      100% { transform: translate(-10%, -10%); }
    }

    .navbar-custom {
      background: #1e1730;
      padding: 0.85rem 2rem;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ffffff !important;
      font-size: 16px;
      font-weight: 600;
    }

    .brand-icon {
      color: #f5a623;
      font-size: 18px;
    }

    .navbar-custom .nav-link {
      color: rgba(255, 255, 255, 0.75) !important;
      font-size: 15px;
      font-weight: 400;
      padding: 0.4rem 1rem !important;
      transition: color 0.2s;
    }

    .navbar-custom .nav-link:hover,
    .navbar-custom .nav-link.active {
      color: #ffffff !important;
    }

    .btn-get-started {
      background: #7c4dff;
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      padding: 9px 24px;
      border-radius: 8px;
      border: none;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-get-started:hover {
      background: #9166ff;
      color: #fff;
    }

    .navbar-toggler {
      border-color: rgba(255,255,255,0.2);
    }
    .navbar-toggler-icon {
      filter: invert(1);
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 36px;
    }

    .login-card h2 {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .login-card .subtitle {
      color: #ccc;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .login-card label {
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: #fff;
      margin-bottom: 18px;
      outline: none;
    }

    .login-card input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 15px rgba(168,85,247,0.5);
    }

    .password-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .password-row a {
      color: #a88bff;
      text-decoration: none;
    }

    .password-row a:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      background: #fff;
      color: #000;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 15px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .signup-link {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .signup-link a {
      color: #a88bff;
      font-weight: 600;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .auth-message {
      display: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .auth-message.error {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    .auth-message.success {
      display: block;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: #86efac;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="landingpage.html">
        <span class="brand-icon">⚡</span>
        SiteBuilder
      </a>

      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-center" id="navbarMenu">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="landingpage.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">My Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="community.html">Community</a></li>
          <li class="nav-item"><a class="nav-link" href="pricing.html">Pricing</a></li>
          <li class="nav-item"><a class="nav-link" href="Aboutus.html">About Us</a></li>
        </ul>
      </div>

      <a href="login.html" class="btn-get-started d-none d-lg-block">Get started</a>
    </div>
  </nav>

  <main class="page">
    <div class="login-card">
      <h2>Sign In</h2>
      <p class="subtitle">Enter your email below to login to your account</p>

      <div id="authMessage" class="auth-message" role="alert"></div>

      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="m@example.com" required />

        <div class="password-row">
          <label for="loginPassword">Password</label>
          <a href="#">Forgot your password?</a>
        </div>
        <input type="password" id="loginPassword" placeholder="Password" required />

        <button type="submit" class="login-btn" id="loginBtn">Login</button>
      </form>

      <div class="signup-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="auth.js"></script>
  <script>
    redirectIfAuthenticated();

    function showMessage(text, type) {
      const el = document.getElementById('authMessage');
      el.textContent = text;
      el.className = type ? 'auth-message ' + type : 'auth-message';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      let success = false;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      showMessage('', '');

      try {
        const response = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Login failed.', 'error');
          return;
        }

        setSession({ id: data.id, name: data.name, email: data.email }, data.token);
        success = true;
        showMessage('Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (err) {
        showMessage('Could not connect to the server. Make sure the backend is running on port 5500.', 'error');
      } finally {
        if (!success) {
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      }
    });
  </script>
</body>
</html>
